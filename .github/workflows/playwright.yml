name: Playwright E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # Automated trigger configured using UTC time (01:00 UTC equals 08:00 AM WIB GMT+7)
  schedule:
    - cron: '0 1 * * *'

# Environment variable to fix the GitHub Actions deprecation warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    # Use the official Playwright Docker image to skip browser installation
    # Note: Ensure the version tag matches the playwright version in package.json
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-jammy

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        # FIXED: Wrapped in quotes to satisfy string type requirement
        node-version: '24'
        # Cache NPM dependencies to speed up the workflow execution
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    # Step added to automatically verify code quality before running automation scripts
    - name: Run Lint Check
      run: npm run lint

    # FIXED: Added 'id' and changed to $GITHUB_OUTPUT to make it visible to the IDE linter
    - name: Generate Timestamp
      id: timestamp
      run: echo "REPORT_DATE=$(date +'%Y-%m-%d-%H%M')" >> $GITHUB_OUTPUT

    - name: Run E2E Tests
      run: npm run test
      env:
        # Force CI mode to prevent terminal from hanging
        CI: true
        PRESET_PREMIUM_EMAIL: ${{ secrets.PRESET_PREMIUM_EMAIL }}
        PRESET_PREMIUM_PASSWORD: ${{ secrets.PRESET_PREMIUM_PASSWORD }}
        PRESET_NORMAL_EMAIL: ${{ secrets.PRESET_NORMAL_EMAIL }}
        PRESET_NORMAL_PASSWORD: ${{ secrets.PRESET_NORMAL_PASSWORD }}

    # Artifact upload step modified to use dynamic date and time variables
    - name: Upload Test Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        # FIXED: Referenced via steps output instead of hidden env context
        name: playwright-report-${{ steps.timestamp.outputs.REPORT_DATE }}
        path: playwright-report/
        retention-days: 7

    - name: Send Telegram Notification
      if: always()
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_TO }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        format: markdown
        message: |
          🤖 *Hotel Planisphere Automation Run*
          
          *Status:* ${{ job.status }}
          *Branch:* ${{ github.ref_name }}
          
          🔍 *Report & Logs:*
          Click the link below to view the GitHub Actions run and download the generated report artifact (ZIP).
          
          🔗 [View GitHub Actions Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})