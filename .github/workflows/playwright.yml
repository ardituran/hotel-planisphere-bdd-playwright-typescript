name: Playwright E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # Run automatically every day at 01:00 UTC (08:00 AM WIB)
  schedule:
    - cron: '0 1 * * *'

# Environment variable to fix the GitHub Actions deprecation warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    # OPSI 4: Menggunakan Official Docker Image dari Playwright
    # (Pastikan versinya sama dengan yang ada di package.json lu)
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-jammy

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24
        # OPSI 3: Caching NPM dependencies biar nggak download dari nol terus
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    # Langkah 'npx playwright install' DIHAPUS karena browser sudah ada di dalam Docker Image

    - name: Run E2E Tests
      run: npm run test
      env:
        # OPSI 2: Memaksa mode CI agar terminal tidak hang
        CI: true
        PRESET_PREMIUM_EMAIL: ${{ secrets.PRESET_PREMIUM_EMAIL }}
        PRESET_PREMIUM_PASSWORD: ${{ secrets.PRESET_PREMIUM_PASSWORD }}
        PRESET_NORMAL_EMAIL: ${{ secrets.PRESET_NORMAL_EMAIL }}
        PRESET_NORMAL_PASSWORD: ${{ secrets.PRESET_NORMAL_PASSWORD }}

    - name: Upload Test Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 7

    - name: Send Telegram Notification
      if: always()
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_TO }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: |
          🤖 Hotel Planisphere Test Result:
          
          Status: ${{ job.status }}
          Branch: ${{ github.ref_name }}
          
          Please check the GitHub Actions tab for the full report!